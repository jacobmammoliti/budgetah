apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: budgetah-backend
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: budgetah-backend
          port: 8000
